<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Erlebnis-Auswahl</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #25302b;
      --muted: #68736d;
      --line: #d8ddd7;
      --paper: #faf7f0;
      --surface: #ffffff;
      --lake: #8db6bd;
      --forest: #496d55;
      --sun: #d8a84e;
      --clay: #b27457;
      --shadow: 0 18px 45px rgba(37, 48, 43, .15);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: linear-gradient(145deg, #fbf8f1 0%, #eef4ef 58%, #f7efe8 100%);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
    }

    button {
      font: inherit;
    }

    .app {
      width: min(100%, 1120px);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 16px;
    }

    .choices {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
      align-content: center;
      align-items: center;
      min-height: 0;
    }

    .choice {
      position: relative;
      min-height: 142px;
      padding: 0;
      border: 1px solid rgba(73, 109, 85, .22);
      border-radius: 8px;
      background: rgba(255, 255, 255, .68);
      color: var(--forest);
      box-shadow: 0 10px 28px rgba(37, 48, 43, .08);
      overflow: hidden;
      cursor: pointer;
      touch-action: manipulation;
      display: grid;
      place-items: center;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .choice:hover,
    .choice:focus-visible {
      border-color: rgba(73, 109, 85, .48);
      box-shadow: var(--shadow);
      transform: translateY(-2px);
      outline: none;
    }

    .choice[aria-pressed="true"] {
      border-color: var(--forest);
      background: rgba(255, 253, 248, .92);
    }

    .choice[aria-pressed="true"]::after {
      content: "Ausgew\00E4 hlt";
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--forest);
      color: #fff;
      font-size: .76rem;
      font-weight: 760;
    }

    .art {
      width: 100%;
      min-height: 140px;
      display: grid;
      place-items: center;
      color: var(--forest);
    }

    .art svg {
      width: min(58vw, 190px);
      height: 110px;
      display: block;
    }

    .status {
      min-height: 58px;
      padding: 12px 14px;
      border: 1px solid rgba(73, 109, 85, .18);
      border-radius: 8px;
      background: rgba(255, 255, 255, .64);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .connector {
      min-height: 44px;
      display: grid;
      place-items: center;
      color: rgba(73, 109, 85, .58);
    }

    .connector svg {
      width: 56px;
      height: 44px;
      display: block;
    }

    .icon-stroke {
      fill: none;
      stroke: currentColor;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-soft {
      fill: none;
      stroke: var(--lake);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .status span {
      color: var(--muted);
      line-height: 1.45;
      font-size: .94rem;
    }

    .status strong {
      color: var(--ink);
    }

    .status button,
    .modal-actions button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      background: var(--forest);
      color: #fff;
      font-weight: 760;
      cursor: pointer;
    }

    .status button {
      display: none;
      white-space: nowrap;
    }

    .status.has-selection button {
      display: inline-flex;
      align-items: center;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: end;
      justify-content: center;
      padding: 18px;
      background: rgba(31, 40, 36, .42);
      z-index: 10;
    }

    .backdrop.open {
      display: flex;
    }

    .modal {
      width: min(100%, 520px);
      max-height: min(86vh, 660px);
      overflow: auto;
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      transform: translateY(6px);
      animation: rise .16s ease forwards;
    }

    @keyframes rise {
      to {
        transform: translateY(0);
      }
    }

    .modal-header {
      min-height: 160px;
      padding: 18px;
      background: linear-gradient(135deg, rgba(141, 182, 189, .26), rgba(216, 168, 78, .18));
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }

    .modal-header h3 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: 0;
    }

    .close {
      width: 44px;
      height: 44px;
      border: 1px solid rgba(37, 48, 43, .16);
      border-radius: 50%;
      background: rgba(255, 255, 255, .72);
      color: var(--ink);
      cursor: pointer;
      font-size: 1.55rem;
      line-height: 1;
    }

    .modal-body {
      padding: 20px 18px 18px;
    }

    .modal-body p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .details {
      display: grid;
      gap: 10px;
      margin: 18px 0;
      padding: 0;
      list-style: none;
    }

    .details li {
      padding: 12px 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.42;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .modal-actions .secondary {
      background: #eef2ee;
      color: var(--forest);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (min-width: 760px), (orientation: landscape) {
      .choices {
        grid-template-columns: minmax(150px, 1fr) minmax(52px, 90px) minmax(150px, 1fr) minmax(52px, 90px) minmax(150px, 1fr);
        gap: 12px;
      }

      .choice {
        min-height: clamp(150px, 42vh, 300px);
      }

      .art {
        min-height: clamp(150px, 42vh, 300px);
      }

      .art svg {
        width: min(18vw, 210px);
        height: min(22vh, 150px);
      }

      .connector {
        min-height: 1px;
      }

      .connector svg {
        width: min(8vw, 80px);
        height: 52px;
      }
    }

    @media (orientation: landscape) and (max-height: 520px) {
      .app {
        padding: 10px 12px;
        gap: 10px;
      }

      .choice {
        min-height: clamp(122px, 58vh, 210px);
      }

      .art {
        min-height: clamp(122px, 58vh, 210px);
      }

      .status {
        min-height: 48px;
        padding: 10px 12px;
      }
    }

    @media (max-width: 640px) and (orientation: portrait) {
      .connector svg {
        transform: rotate(90deg);
      }

      .status button {
        justify-content: center;
        width: 100%;
      }

      .status {
        align-items: stretch;
        flex-direction: column;
      }
    }

    @media (min-width: 620px) {
      .backdrop {
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="choices" aria-label="Verdeckte Erlebnis-Auswahl">
      <button class="choice" type="button" data-id="ship" aria-label="Symbol 1 ausw&auml;hlen" aria-pressed="false">
        <span class="art" aria-hidden="true">
          <svg viewBox="0 0 220 140">
            <path class="icon-soft" d="M26 104c18 8 34 8 52 0s34-8 52 0 34 8 52 0"/>
            <path class="icon-stroke" d="M54 73h112l-18 31H76z"/>
            <path class="icon-stroke" d="M78 49h58l19 24H64z"/>
            <path class="icon-soft" d="M91 61h12m21 0h12"/>
            <path class="icon-stroke" d="M109 30v19"/>
          </svg>
        </span>
      </button>

      <span class="connector" aria-hidden="true">
        <svg viewBox="0 0 80 44">
          <path class="icon-soft" d="M9 24h50"/>
          <path class="icon-soft" d="M49 14l11 10-11 10"/>
        </svg>
      </span>

      <button class="choice" type="button" data-id="gondola" aria-label="Symbol 2 ausw&auml;hlen" aria-pressed="false">
        <span class="art" aria-hidden="true">
          <svg viewBox="0 0 220 140">
            <path class="icon-stroke" d="M30 34h160"/>
            <path class="icon-stroke" d="M110 34v25"/>
            <rect x="66" y="58" width="88" height="56" rx="10" class="icon-stroke"/>
            <path class="icon-soft" d="M83 78h54M86 95h48"/>
            <path class="icon-soft" d="M50 119l31-34 24 26 29-42 37 50"/>
          </svg>
        </span>
      </button>

      <span class="connector" aria-hidden="true">
        <svg viewBox="0 0 80 44">
          <path class="icon-soft" d="M9 24h50"/>
          <path class="icon-soft" d="M49 14l11 10-11 10"/>
        </svg>
      </span>

      <button class="choice" type="button" data-id="mountain" aria-label="Symbol 3 ausw&auml;hlen" aria-pressed="false">
        <span class="art" aria-hidden="true">
          <svg viewBox="0 0 220 140">
            <path class="icon-soft" d="M30 116l39-56 28 33 39-55 54 78"/>
            <path class="icon-stroke" d="M74 114V86h58v28"/>
            <path class="icon-stroke" d="M65 86l38-27 38 27"/>
            <path class="icon-soft" d="M96 114V97h16v17"/>
            <path class="icon-stroke" d="M148 114h34"/>
          </svg>
        </span>
      </button>
    </section>

    <section class="status" id="status" aria-live="polite">
      <span>Symbol w&auml;hlen und best&auml;tigen.</span>
      <button type="button" id="changeSelection">Auswahl &auml;ndern</button>
    </section>
  </main>

  <div class="backdrop" id="backdrop" role="presentation">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalText">
      <div class="modal-header">
        <h3 id="modalTitle"></h3>
        <button class="close" type="button" id="closeModal" aria-label="Fenster schliessen">&times;</button>
      </div>
      <div class="modal-body">
        <p id="modalText"></p>
        <ul class="details" id="modalDetails"></ul>
        <div class="modal-actions">
          <button type="button" id="selectOption">Symbol best&auml;tigen</button>
          <button type="button" class="secondary" id="keepLooking">Anderes Symbol ansehen</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const options = {
      ship: {
        title: 'Sonntagsbrunch auf dem Vierwaldstättersee',
        text: 'Ein ruhiger Start in den Tag auf dem See: direkt ab Luzern, mit Buffet, warmen Gerichten, Desserts und Getränken',
        details: ['Dauer: 10:30 - 13:00', 'Abfahrt und Ankunft in Luzern', 'Anschliessend Flanieren am See oder Verdauungsspaziergang']
      },
      gondola: {
        title: 'Zmorge-Gondel',
        text: 'Ein besonderes Zmorge in der Gondel, w\u00e4hrend die Landschaft langsam unter uns kleiner wird.',
        details: ['Dauer: ab 8:30, ca. 75 - 90 Minuten', 'Abfahrt Talstation Emmeten (ca. 1h ab Luzern)', 'Danach oben aussteigen und Wanderung bis Stockhütte-Klewenalp (ca. 1:30h).']
      },
      mountain: {
        title: 'Älplerzmorge auf dem Mostelberg',
        text: 'Mit der weltweit ersten Drehgondel geht es von Sattel zum Berggasthaus Mostelberg. Dort gibt es ein regionales Buffet mit Rösti, Eiern, Alpkäse, Aufschnitt, Zopf und Kuchen.',
        details: ['Dauer: 9:00 - 11:00', 'Abfahrt Talstation Sattel (ca. 1h ab Luzern)', 'Nachher beliebiges Programm auf dem Berg (Wandern, Rodeln, etc.)']
      }
    };

    const cards = [...document.querySelectorAll('.choice')];
    const backdrop = document.querySelector('#backdrop');
    const modalTitle = document.querySelector('#modalTitle');
    const modalText = document.querySelector('#modalText');
    const modalDetails = document.querySelector('#modalDetails');
    const selectButton = document.querySelector('#selectOption');
    const closeButton = document.querySelector('#closeModal');
    const keepLookingButton = document.querySelector('#keepLooking');
    const statusBox = document.querySelector('#status');
    const changeButton = document.querySelector('#changeSelection');

    let activeId = null;
    let modalState = 'confirm';
    let selectedId = localStorage.getItem('voucherChoice');

    function renderSelection() {
      cards.forEach((card) => {
        card.setAttribute('aria-pressed', String(card.dataset.id === selectedId));
      });

      if (!selectedId) {
        statusBox.classList.remove('has-selection');
        statusBox.querySelector('span').innerHTML = 'Symbol w&auml;hlen und best&auml;tigen.';
        return;
      }

      statusBox.classList.add('has-selection');
      statusBox.querySelector('span').innerHTML = `Du bekommst: <strong>${options[selectedId].title}</strong>.`;
    }

    function openModal(id) {
      activeId = id;
      modalState = 'confirm';
      modalTitle.textContent = 'Sicher?';
      modalText.textContent = 'Die Auswahl ist endgültig, wird direkt gebucht und vom Konto abgezogen (natürlich nicht wirklich)';
      modalDetails.replaceChildren();
      selectButton.textContent = 'Auswahl best\u00e4tigen';
      keepLookingButton.textContent = 'Andere Optionen ansehen';
      backdrop.classList.add('open');
      document.body.style.overflow = 'hidden';
      closeButton.focus();
    }

    function revealActive() {
      const option = options[activeId];
      modalState = 'result';
      modalTitle.textContent = option.title;
      modalText.textContent = option.text;
      modalDetails.replaceChildren(...option.details.map((detail) => {
        const item = document.createElement('li');
        item.textContent = detail;
        return item;
      }));
      selectButton.textContent = 'Yay!';
      keepLookingButton.textContent = 'Auswahl \u00e4ndern';
    }

    function closeModal() {
      backdrop.classList.remove('open');
      document.body.style.overflow = '';
      const activeCard = cards.find((card) => card.dataset.id === activeId);
      activeCard?.focus();
    }

    function selectActive() {
      if (modalState === 'result') {
        closeModal();
        return;
      }

      if (!activeId) return;
      selectedId = activeId;
      localStorage.setItem('voucherChoice', selectedId);
      renderSelection();
      revealActive();
    }

    function clearSelection() {
      selectedId = null;
      localStorage.removeItem('voucherChoice');
      renderSelection();
      closeModal();
      cards[0].focus();
    }

    function handleSecondaryAction() {
      if (modalState === 'result') {
        clearSelection();
        return;
      }

      closeModal();
    }

    cards.forEach((card) => {
      card.addEventListener('click', () => openModal(card.dataset.id));
    });

    selectButton.addEventListener('click', selectActive);
    closeButton.addEventListener('click', closeModal);
    keepLookingButton.addEventListener('click', handleSecondaryAction);

    backdrop.addEventListener('click', (event) => {
      if (event.target === backdrop) closeModal();
    });

    changeButton.addEventListener('click', () => {
      clearSelection();
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && backdrop.classList.contains('open')) {
        closeModal();
      }
    });

    renderSelection();
  </script>
</body>
</html>
